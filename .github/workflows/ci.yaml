name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Rust / fmt / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

  check:
    name: Rust / check / ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: marlin-agent-core-check-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch workspace dependencies
        run: cargo fetch --locked

      - name: Check Rust workspace
        run: cargo check --workspace --all-targets --locked

  lint:
    name: Rust / lint / ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: marlin-agent-core-lint-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch workspace dependencies
        run: cargo fetch --locked

      - name: Run Rust lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Rust / test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: marlin-agent-core-test-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch workspace dependencies
        run: cargo fetch --locked

      - name: Run Rust tests
        run: cargo test --workspace --locked

  gerbil:
    name: Gerbil / gate / ${{ matrix.os }} / ${{ matrix.mode }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            mode: native
            gerbil-source-ref: add922481cec81d05431db014bcb91b30485cf21
            gerbil-source-version: v0.18.2-4-gadd92248
    env:
      CARGO_INCREMENTAL: "0"
      MARLIN_REQUIRE_REAL_GXI: "1"
      MARLIN_GERBIL_SOURCE_REMOTE: https://git.cons.io/mighty-gerbils/gerbil
      MARLIN_GERBIL_SOURCE_REF: ${{ matrix.gerbil-source-ref }}
      MARLIN_GERBIL_SOURCE_VERSION: ${{ matrix.gerbil-source-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: marlin-agent-core-gerbil-${{ runner.os }}
          cache-on-failure: true

      - name: Cache Gerbil source build
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/opt/gerbil
          key: marlin-gerbil-source-${{ runner.os }}-${{ runner.arch }}-${{ env.MARLIN_GERBIL_SOURCE_REF }}-v2

      - name: Cache Gerbil package dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gerbil
            crates/marlin-gerbil-scheme/gerbil/.gerbil
          key: marlin-gerbil-package-deps-${{ runner.os }}-${{ runner.arch }}-${{ env.MARLIN_GERBIL_SOURCE_REF }}-${{ hashFiles('crates/marlin-gerbil-scheme/gerbil/gerbil.pkg') }}-v1
          restore-keys: |
            marlin-gerbil-package-deps-${{ runner.os }}-${{ runner.arch }}-${{ env.MARLIN_GERBIL_SOURCE_REF }}-

      - name: Configure C compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: marlin-gerbil-ccache-${{ matrix.os }}-${{ matrix.mode }}-${{ env.MARLIN_GERBIL_SOURCE_REF }}
          restore-keys: |
            marlin-gerbil-ccache-${{ matrix.os }}-${{ matrix.mode }}-
          max-size: 2G
          variant: ccache
          create-symlink: true
          install: yes
          update-package-index: true
          job-summary: Gerbil ccache statistics

      - name: Fetch workspace dependencies
        run: cargo fetch --locked

      - name: Install Gerbil from source
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            git \
            jq \
            libsqlite3-dev \
            libssl-dev \
            openssl \
            pkg-config \
            sqlite3 \
            zlib1g-dev

          build_jobs="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 2)"
          gerbil_install_base="$HOME/.local/opt/gerbil"
          gerbil_source_root="$HOME/.cache/marlin/gerbil-source/$MARLIN_GERBIL_SOURCE_REF"
          gerbil_toolchain_ready() {
            test -x "$gerbil_install_base/bin/gxi" \
              && test -x "$gerbil_install_base/bin/gxc" \
              && test -x "$gerbil_install_base/bin/gxpkg" \
              && test -x "$gerbil_install_base/bin/gsc"
          }
          # ccache-action shadows cc/c++ in /usr/local/bin. Gerbil/Gambit
          # bootstrap must use the real system compiler; restored ccache objects
          # can leave bootstrap install artifacts such as gsi/gsc unavailable.
          export CC="/usr/bin/cc"
          export CXX="/usr/bin/c++"
          ccache --zero-stats || true
          if ! gerbil_toolchain_ready; then
            rm -rf "$gerbil_source_root" "$gerbil_install_base"
            mkdir -p "$gerbil_source_root"
            git -C "$gerbil_source_root" init
            git -C "$gerbil_source_root" remote add origin "$MARLIN_GERBIL_SOURCE_REMOTE"
            git -C "$gerbil_source_root" fetch --depth 1 origin "$MARLIN_GERBIL_SOURCE_REF"
            git -C "$gerbil_source_root" checkout --detach FETCH_HEAD
            cd "$gerbil_source_root"
            ./configure --prefix="$gerbil_install_base" --version-string="$MARLIN_GERBIL_SOURCE_VERSION"
            make -j"$build_jobs"
            make install
          fi
          gerbil_toolchain_ready

          echo "$gerbil_install_base/bin" >> "$GITHUB_PATH"
          echo "MARLIN_GERBIL_GXI=$gerbil_install_base/bin/gxi" >> "$GITHUB_ENV"
          echo "MARLIN_GERBIL_GXPKG=$gerbil_install_base/bin/gxpkg" >> "$GITHUB_ENV"
          echo "MARLIN_GERBIL_GXC=$gerbil_install_base/bin/gxc" >> "$GITHUB_ENV"
          echo "GERBIL_BUILD_CORES=$build_jobs" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_JOBS=$build_jobs" >> "$GITHUB_ENV"
          echo "CC=cc" >> "$GITHUB_ENV"
          echo "CXX=c++" >> "$GITHUB_ENV"
          ccache --show-stats || true

      - name: Verify Gerbil toolchain
        run: |
          set -euxo pipefail
          command -v gsc
          gxi --version
          gxpkg help >/dev/null
          gxc --help >/dev/null
          gxi -e '(begin (display "gerbil-ready") (newline))'
          gxpkg list || true

      - name: Install Gerbil package dependencies
        working-directory: crates/marlin-gerbil-scheme/gerbil
        run: |
          set -euxo pipefail
          mkdir -p "$HOME/.gerbil/pkg" "$PWD/.gerbil"
          gxpkg dir --add git.cons.io/mighty-gerbils/gerbil-directory || true
          gxpkg deps --install

      - name: Test Gerbil workflow surface
        run: |
          cargo test -p marlin-gerbil-ir -p marlin-gerbil-scheme -p marlin-org-workflow --locked
          cargo test -p marlin-rust-project-harness-policy --locked gerbil_runtime_asset

      - name: Check Gerbil binaries and examples
        run: cargo check -p marlin-gerbil-scheme --bins --examples --locked

      - name: Build Gerbil package assets
        working-directory: crates/marlin-gerbil-scheme/gerbil
        run: gxpkg env ./build.ss compile

      - name: Run Gerbil package tests
        working-directory: crates/marlin-gerbil-scheme/gerbil
        run: |
          GERBIL_LOADPATH="$PWD/src:$PWD/.gerbil/lib" gxpkg env gxi t/all-test.ss

      - name: Run Rust-driven Gerbil bridge smoke
        run: |
          cargo test --locked -p marlin-gerbil-scheme --test unit_test \
            command::real_gxi::examples::build_script::command_compiler_real_gxi_build_script_runs_scheme_to_rust_bridge_smoke \
            -- --ignored --exact --nocapture

      - name: Audit Gerbil package assets
        run: |
          cargo package -p marlin-gerbil-scheme --list --allow-dirty | tee gerbil-package-files.txt
          git -C crates/marlin-gerbil-scheme ls-files \
            Cargo.toml \
            README.md \
            benches \
            build.rs \
            examples \
            gerbil \
            include \
            src \
            tests \
            | sort > gerbil-package-required-assets.txt
          while IFS= read -r asset; do
            if ! grep -Fx "$asset" gerbil-package-files.txt >/dev/null; then
              echo "::error::marlin-gerbil-scheme package is missing tracked asset: $asset"
              exit 1
            fi
          done < gerbil-package-required-assets.txt
