[features]
hooks = true
unified_exec = true

# BEGIN agent-semantic-protocol agent hooks
# Generated by `asp hook install --client codex`.
# Root dispatcher for activated semantic hook providers.

[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"

[[hooks.SessionStart.hooks]]
type = "command"
timeout = 5
statusMessage = "Loading semantic agent hook activation"
command = '''
repo_root='/Users/guangtao/ghq/github.com/tao3k/marlin-agent-core'
cd "$repo_root"
activation="$repo_root/.cache/agent-semantic-protocol/hooks/activation.json"
config="$repo_root/.codex/agent-semantic-protocol/hooks/config.toml"
exec asp hook session-start --client codex --activation "$activation" --config "$config"
'''

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
